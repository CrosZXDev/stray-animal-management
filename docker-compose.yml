services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stray-animal-db
    environment:
      POSTGRES_USER: stray_admin
      POSTGRES_PASSWORD: stray_dev_password
      POSTGRES_DB: stray_animal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stray_admin -d stray_animal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stray-animal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
