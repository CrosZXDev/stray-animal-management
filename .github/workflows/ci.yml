name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.4.0"
  AWS_REGION: ap-southeast-1
  ECR_API_REPO: stray-animal-api
  ECR_WEB_REPO: stray-animal-web
  ECS_CLUSTER: stray-animal-cluster
  ECS_API_SERVICE: stray-animal-api-service
  ECS_WEB_SERVICE: stray-animal-web-service

jobs:
  # ─── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: stray_animal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/stray_animal_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-ci
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate

      - name: Run database migrations
        run: cd apps/api && npx prisma migrate deploy

      - name: Run tests
        run: pnpm run test

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  # ─── Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG

      - name: Deploy to ECS Staging
        env:
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER-staging \
            --service $ECS_API_SERVICE \
            --force-new-deployment
          aws ecs update-service \
            --cluster $ECS_CLUSTER-staging \
            --service $ECS_WEB_SERVICE \
            --force-new-deployment

  # ─── Deploy to Production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG .
          docker build -f apps/api/Dockerfile -t $ECR_REGISTRY/$ECR_API_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_API_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_API_REPO:latest

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG .
          docker build -f apps/web/Dockerfile -t $ECR_REGISTRY/$ECR_WEB_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_WEB_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_WEB_REPO:latest

      - name: Deploy to ECS Production
        env:
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER-production \
            --service $ECS_API_SERVICE \
            --force-new-deployment
          aws ecs update-service \
            --cluster $ECS_CLUSTER-production \
            --service $ECS_WEB_SERVICE \
            --force-new-deployment
